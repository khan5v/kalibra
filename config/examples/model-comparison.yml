# Model comparison — evaluate cost vs. quality tradeoffs between models.
#
# Usage:
#   kalibra compare --baseline @gpt4-run --current @gpt4o-run \
#     --config config/examples/model-comparison.yml
#
# Focuses on cost-effectiveness metrics. No hard gates — use this
# for exploratory analysis when evaluating a model swap.

metrics:
  - success_rate
  - cost
  - cost_quality
  - token_usage
  - token_efficiency
  - duration

require: []
  # Uncomment to enforce minimum quality:
  # - success_rate_delta >= -5      # tolerate up to 5 pp drop if cost improves
  # - cost_per_success <= 0.10      # absolute cap on cost per success
