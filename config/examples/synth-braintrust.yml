# Synthetic traces on Braintrust — generated by scripts/synth_traces.py
#
# Usage:
#   python3 scripts/synth_traces.py --mode baseline --target braintrust --project synth
#   python3 scripts/synth_traces.py --mode current  --target braintrust --project synth
#   kalibra compare --config config/examples/synth-braintrust.yml

sources:
  bt-baseline:
    source: braintrust
    project: synth
    since: 1d
    limit: 500
    tags: [kalibra, baseline]
  bt-current:
    source: braintrust
    project: synth
    since: 1d
    limit: 500
    tags: [kalibra, current]

baseline: bt-baseline
current: bt-current

fields:
  task_id: braintrust.task_id

metrics:
  - success_rate
  - per_task
  - cost
  - steps
  - duration
  - token_usage
  - token_efficiency
  - cost_quality

require:
  - success_rate_delta >= -5
  - regressions <= 10
  - cost_delta_pct <= 30
