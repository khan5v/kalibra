# Quick check — fast, lightweight comparison for local development.
#
# Usage:
#   kalibra compare --baseline ./baseline.jsonl --current ./current.jsonl \
#     --config config/examples/quick-check.yml
#
# Runs only the cheapest metrics (no path analysis, no per-task matching).
# Good for rapid iteration when you're tweaking prompts locally.

metrics:
  - success_rate
  - cost
  - duration
  - token_usage

require: []
