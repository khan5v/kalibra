# Synthetic traces on Langfuse — generated by scripts/synth_traces.py
#
# Usage:
#   python3 scripts/synth_traces.py --mode baseline --target langfuse
#   python3 scripts/synth_traces.py --mode current  --target langfuse
#   kalibra compare --config config/examples/synth-langfuse.yml

sources:
  baseline:
    source: langfuse
    project: synth
    since: 1d
    limit: 500
    tags: [kalibra, baseline]
  current:
    source: langfuse
    project: synth
    since: 1d
    limit: 500
    tags: [kalibra, current]

baseline: baseline
current: current

metrics:
  - success_rate
  - per_task
  - cost
  - steps
  - duration
  - token_usage
  - token_efficiency
  - cost_quality

require:
  - success_rate_delta >= -5
  - regressions <= 10
  - cost_delta_pct <= 30
