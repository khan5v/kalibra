# Braintrust synthetic traces — generated by scripts/synth_traces.py
#
# Usage:
#   kalibra pull @bt-baseline
#   kalibra pull @bt-current
#   kalibra compare --baseline @bt-baseline --current @bt-current
#
# Environment variables:
#   BRAINTRUST_API_KEY

bt-baseline:
  source: braintrust
  project: synth
  since: 1d
  limit: 500
  tags: [kalibra, baseline]

bt-current:
  source: braintrust
  project: synth
  since: 1d
  limit: 500
  tags: [kalibra, current]
